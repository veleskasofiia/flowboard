<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="FlowBoard logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="48" height="48" rx="13" fill="url(#bg)"/>

  <!-- Hub spokes -->
  <line x1="24" y1="24" x2="9"  y2="13" stroke="rgba(255,255,255,0.35)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="39" y2="13" stroke="rgba(255,255,255,0.35)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="39" y2="35" stroke="rgba(255,255,255,0.35)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="9"  y2="35" stroke="rgba(255,255,255,0.35)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Satellite nodes -->
  <circle cx="9"  cy="13" r="4" fill="white" opacity="0.85"/>
  <circle cx="39" cy="13" r="4" fill="white" opacity="0.85"/>
  <circle cx="39" cy="35" r="4" fill="white" opacity="0.85"/>
  <circle cx="9"  cy="35" r="4" fill="white" opacity="0.85"/>

  <!-- Centre hub -->
  <circle cx="24" cy="24" r="8" fill="url(#arc)"/>

  <!-- Letter F centred in hub -->
  <text
    x="24" y="29"
    text-anchor="middle"
    font-size="11"
    font-weight="800"
    font-family="Arial, sans-serif"
    fill="#2563eb"
  >F</text>
</svg>
